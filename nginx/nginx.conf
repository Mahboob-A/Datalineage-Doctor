events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/x-javascript;

    # Max webhook / API body size
    client_max_body_size 10m;

    # ── Upstreams ────────────────────────────────────────────
    upstream app            { server app:8000; }
    upstream grafana        { server grafana:3000; }
    upstream prometheus_svc { server prometheus:9090; }
    upstream openmetadata   { server openmetadata_server:8585; }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name dldoctor.app;

        # Let's Encrypt ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ────────────────────────────────────
    server {
        listen 443 ssl;
        server_name dldoctor.app;

        ssl_certificate     /etc/letsencrypt/live/dldoctor.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dldoctor.app/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy no-referrer-when-downgrade;

        # Common proxy headers passed to all upstreams
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 90s;

        # ── FastAPI app (landing, dashboard, webhook, docs) ──
        location / {
            proxy_pass http://app;
        }

        # ── Grafana subpath ──────────────────────────────────
        # Grafana is configured with GF_SERVER_SERVE_FROM_SUB_PATH=true
        # and GF_SERVER_ROOT_URL=https://dldoctor.app/grafana
        # so it routes internally at /grafana/ already.
        location /grafana/ {
            proxy_pass http://grafana;
        }

        # ── Prometheus subpath ───────────────────────────────
        # Prometheus is started with --web.route-prefix=/prometheus
        # so its internal routing is already under /prometheus.
        location /prometheus/ {
            proxy_pass http://prometheus_svc;
        }

        # ── OpenMetadata UI ──────────────────────────────────
        # NOTE: OM is a complex SPA. The subpath proxy rewrites
        # the path prefix. Static assets may reference root paths,
        # so for the hackathon judges direct access is recommended.
        # Full OM URL: https://dldoctor.app/openmetadata/
        location /openmetadata/ {
            proxy_pass         http://openmetadata/;
            proxy_read_timeout 120s;
        }
    }
}
