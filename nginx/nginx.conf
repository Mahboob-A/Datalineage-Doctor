events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/x-javascript;

    client_max_body_size 10m;

    # ── Upstreams ────────────────────────────────────────────
    upstream app            { server app:8000; }
    upstream grafana        { server grafana:3000; }
    upstream prometheus_svc { server prometheus:9090; }
    upstream openmetadata   { server openmetadata_server:8585; }

    # ── Common proxy settings (snippet reused via include workaround) ─
    # Defined once here, referenced in each server block below.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect  (all domains)
    # ════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name dldoctor.app om.dldoctor.app grafana.dldoctor.app prometheus.dldoctor.app;

        # Let's Encrypt ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ════════════════════════════════════════════════════════
    # dldoctor.app — main FastAPI app
    # ════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name dldoctor.app;

        ssl_certificate     /etc/letsencrypt/live/dldoctor.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dldoctor.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy no-referrer-when-downgrade;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 90s;

        # Demo trigger has a longer timeout (RCA can take ~2 min)
        location = /api/demo/trigger {
            proxy_pass         http://app;
            proxy_read_timeout 360s;
        }

        # Everything else → FastAPI app
        location / {
            proxy_pass http://app;
        }
    }

    # ════════════════════════════════════════════════════════
    # om.dldoctor.app — OpenMetadata UI
    # Serving OM at subdomain root eliminates all SPA asset path issues.
    # ════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name om.dldoctor.app;

        ssl_certificate     /etc/letsencrypt/live/dldoctor.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dldoctor.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 120s;

        # Increase buffer sizes for OM's large API responses
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        location / {
            proxy_pass http://openmetadata;
        }
    }

    # ════════════════════════════════════════════════════════
    # grafana.dldoctor.app — Grafana dashboards
    # Serving at root eliminates GF_SERVER_SERVE_FROM_SUB_PATH complexity.
    # ════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name grafana.dldoctor.app;

        ssl_certificate     /etc/letsencrypt/live/dldoctor.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dldoctor.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 90s;

        location / {
            proxy_pass http://grafana;
        }
    }

    # ════════════════════════════════════════════════════════
    # prometheus.dldoctor.app — Prometheus UI
    # ════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name prometheus.dldoctor.app;

        ssl_certificate     /etc/letsencrypt/live/dldoctor.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dldoctor.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;

        location / {
            proxy_pass http://prometheus_svc;
        }
    }
}
