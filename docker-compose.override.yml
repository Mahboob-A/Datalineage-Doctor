services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
      - app_venv:/app/.venv
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    volumes:
      - .:/app
      - app_venv:/app/.venv
    command: uv run celery -A worker.celery_app worker --loglevel=info --pool=solo

volumes:
  app_venv:
